<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Techilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .navbar-nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; }
    .nav-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .main-layout { padding-top: 64px; }
    .main-content { max-width: 800px; margin: 0 auto; padding: 24px; }
    .profile-hero { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; margin-bottom: 24px; }
    .profile-banner { height: 180px; background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,119,204,0.1)); }
    .profile-info { padding: 0 32px 28px; display: flex; gap: 24px; align-items: flex-end; position: relative; }
    .profile-avatar-wrap { margin-top: -60px; }
    .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-card); background: var(--bg-hover); display: block; }
    .profile-meta { flex: 1; padding-bottom: 4px; }
    .profile-name { font-size: 24px; font-weight: 800; }
    .profile-handle { font-size: 15px; color: var(--text-muted); margin-top: 2px; }
    .profile-bio { font-size: 15px; color: var(--text-secondary); margin-top: 10px; }
    .profile-stats { display: flex; gap: 32px; margin-top: 16px; }
    .stat-item { }
    .stat-value { font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
    .profile-actions { display: flex; gap: 10px; }
    .spinner-lg { width: 40px; height: 40px; border-width: 3px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="feed.html" class="navbar-brand">
      <div class="navbar-logo">T</div>
      <span class="navbar-title">Tech<span>illa</span></span>
    </a>
    <div class="navbar-nav">
      <a href="feed.html" class="nav-btn">🏠 Feed</a>
      <a href="upload.html" class="nav-btn primary" style="background:var(--accent);color:#000;">+ Upload</a>
      <img id="navAvatar" class="nav-avatar" src="" alt="Profile" />
    </div>
  </nav>

  <div class="main-layout">
    <main class="main-content">
      <div id="profileWrapper">
        <div class="loading-overlay" style="padding:60px;">
          <div class="spinner spinner-lg"></div>
          <span>Loading profile...</span>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    async function init() {
      try {
        const profile = await api.getMyProfile(0, 1);
        const avatar = avatarUrl(profile.profilePictureUrl, profile.username);
        document.getElementById('navAvatar').src = avatar;

        document.getElementById('profileWrapper').innerHTML = `
          <div class="profile-hero">
            <div class="profile-banner"></div>
            <div class="profile-info">
              <div class="profile-avatar-wrap">
                <img class="profile-avatar" src="${avatar}" />
              </div>
              <div class="profile-meta">
                <div class="profile-name">${profile.username}</div>
                <div class="profile-handle">@${profile.username}</div>
                ${profile.bio ? `<div class="profile-bio">${profile.bio}</div>` : ''}
                <div class="profile-stats">
                  <div class="stat-item">
                    <div class="stat-value">${(profile.reels || []).length}</div>
                    <div class="stat-label">Reels</div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-value">${profile.followerCount || 0}</div>
                    <div class="stat-label">Followers</div>
                  </div>
                </div>
              </div>
              <div class="profile-actions">
                <button class="btn btn-secondary" onclick="handleLogout()">↩ Sign Out</button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('profileWrapper').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading profile</div></div>`;
      }
    }

    async function handleLogout() {
      try { await api.logout(); } catch {}
      auth.logout();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
