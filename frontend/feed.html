<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — Techilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .navbar-nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s ease; }
    .nav-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
    .nav-btn.primary { background: var(--accent); color: #000; font-weight: 600; }
    .nav-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); cursor: pointer; }
    .main-layout { padding-top: 64px; }
    .main-content { max-width: 680px; margin: 0 auto; padding: 24px; }
    .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .feed-title { font-size: 22px; font-weight: 700; }
    .reel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; transition: all 0.2s ease; }
    .reel-card:hover { border-color: var(--border-light); box-shadow: var(--shadow-md); }
    .reel-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; }
    .reel-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: var(--bg-hover); border: 2px solid var(--border); cursor: pointer; }
    .reel-user-info { flex: 1; }
    .reel-username { font-size: 15px; font-weight: 600; color: var(--text-primary); text-decoration: none; cursor: pointer; }
    .reel-username:hover { color: var(--accent); }
    .reel-time { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .reel-video-container { position: relative; background: #000; aspect-ratio: 9/16; max-height: 500px; cursor: pointer; overflow: hidden; }
    .reel-thumbnail { width: 100%; height: 100%; object-fit: cover; display: block; }
    .reel-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: all 0.2s ease; }
    .reel-video-container:hover .reel-play-overlay { opacity: 1; }
    .play-icon { width: 60px; height: 60px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .reel-body { padding: 16px 20px; }
    .reel-description { font-size: 15px; color: var(--text-primary); line-height: 1.5; margin-bottom: 16px; }
    .reel-actions { display: flex; align-items: center; gap: 20px; }
    .action-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: none; color: var(--text-secondary); font-size: 14px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); transition: all 0.2s ease; }
    .action-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
    .action-btn.liked { color: #ff4d6a; }
    .action-icon { font-size: 20px; }
    .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; color: var(--text-muted); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; color: var(--text-muted); }
    .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 20px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="feed.html" class="navbar-brand">
      <div class="navbar-logo">T</div>
      <span class="navbar-title">Tech<span>illa</span></span>
    </a>
    <div class="navbar-nav">
      <a href="feed.html" class="nav-btn active">🏠 Feed</a>
      <a href="upload.html" class="nav-btn primary">+ Upload</a>
      <img id="navAvatar" class="nav-avatar" src="" alt="Profile" onclick="window.location.href='profile.html'" />
    </div>
  </nav>

  <div class="main-layout">
    <main class="main-content">
      <div>
        <div class="feed-header">
          <h1 class="feed-title">For You</h1>
          <button class="btn btn-ghost btn-sm" onclick="refreshFeed()">↻ Refresh</button>
        </div>
        <div id="feedContent">
          <div class="loading-overlay">
            <div class="spinner"></div>
            <span>Loading reels...</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="video-modal-overlay" id="videoModal" style="position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;">
    <button class="video-modal-close" onclick="closeVideoModal()" style="position:fixed;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;z-index:10;">✕</button>
    <video id="modalVideo" style="max-height:85vh;object-fit:contain;" controls autoplay></video>
  </div>

  <div class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    let myProfile = null;
    let feedBeforeScore = 9999999999999;
    let feedLoading = false;

    async function init() {
      try {
        myProfile = await api.getMyProfile(0, 1);
        document.getElementById('navAvatar').src = avatarUrl(myProfile.profilePictureUrl, myProfile.username);
      } catch {}
      await loadFeed();
    }

    async function loadFeed() {
      if (feedLoading) return;
      feedLoading = true;
      try {
        try { await api.buildFeed(); } catch {}
        const reels = await api.getFeed(feedBeforeScore, 10);
        if (!reels || reels.length === 0) {
          document.getElementById('feedContent').innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-title">No reels yet</div></div>`;
          return;
        }
        feedBeforeScore = reels[reels.length - 1].createdAt ? Number(reels[reels.length - 1].createdAt) : feedBeforeScore - 1;
        const html = reels.map(r => `
          <div class="reel-card">
            <div class="reel-header">
              <img class="reel-avatar" src="${avatarUrl(null, r.username)}" />
              <div class="reel-user-info">
                <span class="reel-username">${r.username}</span>
                <div class="reel-time">now</div>
              </div>
            </div>
            <div class="reel-video-container" onclick="openVideoModal('${r.reelUrl || ''}')">
              ${r.thumbnailUrl ? `<img class="reel-thumbnail" src="${r.thumbnailUrl}" />` : `<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;">🎬</div>`}
              <div class="reel-play-overlay"><div class="play-icon">▶</div></div>
            </div>
            <div class="reel-body">
              <div class="reel-description">${r.description || '—'}</div>
              <div class="reel-actions">
                <button class="action-btn" onclick="toggleLike('${r.reelId}')"><span class="action-icon">🤍</span></button>
                <button class="action-btn"><span class="action-icon">💬</span></button>
                <button class="action-btn"><span class="action-icon">🔖</span></button>
              </div>
            </div>
          </div>
        `).join('');
        document.getElementById('feedContent').innerHTML = html;
        reels.forEach(r => api.markSeen(r.reelId).catch(() => {}));
      } catch (err) {
        document.getElementById('feedContent').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading feed</div></div>`;
      } finally {
        feedLoading = false;
      }
    }

    async function toggleLike(reelId) {
      try {
        const res = await api.toggleLike(reelId);
        toast(res.liked ? 'Liked!' : 'Unliked', 'success');
      } catch (err) {
        toast(err.message || 'Failed', 'error');
      }
    }

    function openVideoModal(url) {
      if (!url || url === 'null') { toast('Video processing', 'info'); return; }
      document.getElementById('modalVideo').src = url;
      document.getElementById('videoModal').style.display = 'flex';
    }

    function closeVideoModal() {
      const video = document.getElementById('modalVideo');
      video.pause();
      video.src = '';
      document.getElementById('videoModal').style.display = 'none';
    }

    function refreshFeed() {
      feedBeforeScore = 9999999999999;
      loadFeed();
    }

    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300 && !feedLoading) {
        loadFeed();
      }
    });

    init();
  </script>
</body>
</html>
